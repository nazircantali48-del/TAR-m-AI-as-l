<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarım AI - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <span class="text-5xl">🌿</span>
            <h1 class="text-2xl font-bold text-gray-800 mt-2">Tarım AI</h1>
            <p class="text-gray-500 mt-1">Hesabına giriş yap</p>
        </div>

        <div id="hata" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 mb-4 text-sm"></div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" placeholder="ornek@email.com"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Şifre</label>
                <input type="password" id="sifre" placeholder="••••••••"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <button onclick="girisYap()"
                id="giris-btn"
                class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition">
                Giriş Yap
            </button>
        </div>

        <p class="text-center text-gray-500 text-sm mt-6">
            Hesabın yok mu? <a href="/kayit" class="text-green-600 font-medium hover:underline">Kayıt ol</a>
        </p>
    </div>

    <script>
        // Zaten giriş yapmışsa ana sayfaya yönlendir
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }

        async function girisYap() {
            const email = document.getElementById('email').value;
            const sifre = document.getElementById('sifre').value;

            if (!email || !sifre) { 
                hataGoster('Email ve şifre gerekli!'); 
                return; 
            }

            const btn = document.getElementById('giris-btn');
            btn.disabled = true;
            btn.textContent = 'Giriş yapılıyor...';

            const form = new FormData();
            form.append('email', email);
            form.append('sifre', sifre);

            try {
                const res = await fetch('/api/giris', { method: 'POST', body: form });
                const veri = await res.json();

                if (!res.ok) {
                    hataGoster(veri.detail || 'Hata oluştu');
                    return;
                }

                localStorage.setItem('token', veri.token);
                localStorage.setItem('kullanici_ad', veri.kullanici_ad);
                window.location.href = '/';

            } catch (e) {
                hataGoster('Bağlantı hatası');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Giriş Yap';
            }
        }

        function hataGoster(mesaj) {
            const div = document.getElementById('hata');
            div.textContent = mesaj;
            div.classList.remove('hidden');
        }

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') girisYap();
        });
    </script>
</body>
</html>
