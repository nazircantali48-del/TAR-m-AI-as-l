<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarım AI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">

    <nav class="bg-green-700 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🌿</span>
                <span class="text-xl font-bold">Tarım AI</span>
            </div>
            <div class="flex items-center gap-6">
                <a href="/" class="font-semibold border-b-2 border-white pb-1">Dashboard</a>
                <a href="/analiz" class="hover:text-green-200">Analiz</a>
                <a href="/bahceler" class="hover:text-green-200">Bahçeler</a>
                <a href="/gecmis" class="hover:text-green-200">Geçmiş</a>
                <a href="/ilaclar" class="hover:text-green-200">İlaçlama</a>
                <span id="kullanici-ad" class="text-green-200 text-sm"></span>
                <button onclick="cikisYap()" class="bg-green-800 px-3 py-1 rounded-lg text-sm hover:bg-green-900">Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Hoş Geldiniz 👋</h1>
            <p class="text-gray-500 mt-1">Tarım AI kontrol paneliniz</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl shadow p-6 border-l-4 border-green-500">
                <p class="text-gray-500 text-sm">Toplam Bahçe</p>
                <p class="text-4xl font-bold text-green-600 mt-1" id="toplam-bahce">-</p>
            </div>
            <div class="bg-white rounded-2xl shadow p-6 border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">Toplam Analiz</p>
                <p class="text-4xl font-bold text-blue-600 mt-1" id="toplam-analiz">-</p>
            </div>
            <div class="bg-white rounded-2xl shadow p-6 border-l-4 border-orange-500">
                <p class="text-gray-500 text-sm">Toplam İlaçlama</p>
                <p class="text-4xl font-bold text-orange-600 mt-1" id="toplam-ilaclama">-</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Son Analizler</h2>
                <a href="/analiz" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">+ Yeni Analiz</a>
            </div>
            <div id="son-analizler">
                <p class="text-gray-400 text-center py-8">Yükleniyor...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="/analiz" class="bg-green-600 text-white rounded-2xl p-6 text-center hover:bg-green-700 transition">
                <div class="text-3xl mb-2">🔍</div>
                <div class="font-semibold">Analiz Yap</div>
            </a>
            <a href="/bahceler" class="bg-blue-600 text-white rounded-2xl p-6 text-center hover:bg-blue-700 transition">
                <div class="text-3xl mb-2">🌳</div>
                <div class="font-semibold">Bahçeler</div>
            </a>
            <a href="/gecmis" class="bg-purple-600 text-white rounded-2xl p-6 text-center hover:bg-purple-700 transition">
                <div class="text-3xl mb-2">📋</div>
                <div class="font-semibold">Geçmiş</div>
            </a>
            <a href="/ilaclar" class="bg-orange-600 text-white rounded-2xl p-6 text-center hover:bg-orange-700 transition">
                <div class="text-3xl mb-2">💊</div>
                <div class="font-semibold">İlaçlama</div>
            </a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const kullaniciAd = localStorage.getItem('kullanici_ad');

        if (!token) {
            window.location.href = '/giris';
        }

        document.getElementById('kullanici-ad').textContent = kullaniciAd ? `👤 ${kullaniciAd}` : '';

        function cikisYap() {
            localStorage.removeItem('token');
            localStorage.removeItem('kullanici_ad');
            window.location.href = '/giris';
        }

        async function yukle() {
            const [bahceler, analizler, ilaclamalar] = await Promise.all([
                fetch('/api/bahceler').then(r => r.json()),
                fetch('/api/analizler').then(r => r.json()),
                fetch('/api/ilaclamalar').then(r => r.json()),
            ]);

            document.getElementById('toplam-bahce').textContent = bahceler.length;
            document.getElementById('toplam-analiz').textContent = analizler.length;
            document.getElementById('toplam-ilaclama').textContent = ilaclamalar.length;

            const sonAnalizler = analizler.slice(0, 5);
            const div = document.getElementById('son-analizler');

            if (sonAnalizler.length === 0) {
                div.innerHTML = '<p class="text-gray-400 text-center py-8">Henüz analiz yapılmadı</p>';
                return;
            }

            div.innerHTML = sonAnalizler.map(a => `
                <div class="flex items-center justify-between py-3 border-b last:border-0">
                    <div class="flex items-center gap-3">
                        <img src="/${a.fotograf_yolu}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <p class="font-medium text-gray-800">${a.hastalik_adi}</p>
                            <p class="text-sm text-gray-400">${new Date(a.tarih).toLocaleDateString('tr-TR')}</p>
                        </div>
                    </div>
                    <span class="px-3 py-1 rounded-full text-xs font-medium ${a.hastalik_adi === 'Sağlıklı' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                        ${a.hastalik_adi}
                    </span>
                </div>
            `).join('');
        }

        yukle();
    </script>
</body>
</html>
