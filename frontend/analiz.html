<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarım AI - Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0fdf4; }
        .gradient-header { background: linear-gradient(135deg, #065f46 0%, #059669 50%, #10b981 100%); }
        .nav-link { padding: 6px 14px; border-radius: 8px; transition: background 0.15s; font-size: 14px; font-weight: 500; }
        .nav-link:hover { background: rgba(255,255,255,0.15); }
        .nav-link.active { background: rgba(255,255,255,0.2); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.35s ease forwards; }
    </style>
</head>
<body>

    <nav class="gradient-header text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-white bg-opacity-20 rounded-xl flex items-center justify-center text-lg">🌿</div>
                <span class="text-lg font-bold tracking-tight">Tarım AI</span>
            </div>
            <div class="flex items-center gap-1">
                <a href="/" class="nav-link text-white">Dashboard</a>
                <a href="/analiz" class="nav-link active text-white">Analiz</a>
                <a href="/bahceler" class="nav-link text-white">Bahçeler</a>
                <a href="/gecmis" class="nav-link text-white">Geçmiş</a>
                <a href="/ilaclar" class="nav-link text-white">İlaçlama</a>
            </div>
            <div class="flex items-center gap-3">
                <span id="kullanici-ad" class="text-sm text-green-100 font-medium"></span>
                <button onclick="cikisYap()" class="bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-lg text-sm font-medium transition">Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="bg-gradient-to-r from-emerald-50 to-green-100 px-6 py-8 border-b border-emerald-100">
        <div class="max-w-4xl mx-auto">
            <p class="text-emerald-600 font-semibold text-sm mb-1">🔍 Yapay Zeka Analizi</p>
            <h1 class="text-3xl font-extrabold text-gray-800 mb-1">Hastalık Analizi</h1>
            <p class="text-gray-500">Fotoğraf yükle, yapay zeka analiz etsin</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-6 py-8">

        <div class="bg-white rounded-2xl shadow-sm p-8 fade-in">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Bahçe Seç</label>
                <select id="bahce-sec" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-gray-50">
                    <option value="">Bahçe seçin...</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Fotoğraf</label>
                <div id="yukle-alan"
                    class="border-2 border-dashed border-gray-300 rounded-2xl p-12 text-center cursor-pointer hover:border-emerald-500 hover:bg-emerald-50 transition"
                    onclick="document.getElementById('fotograf-input').click()">
                    <div class="text-5xl mb-3">📷</div>
                    <p class="text-gray-500 font-medium">Fotoğraf seçmek için tıkla</p>
                    <p class="text-gray-400 text-sm mt-1">JPG, PNG desteklenir</p>
                </div>
                <input type="file" id="fotograf-input" accept="image/*" class="hidden" onchange="fotografSec(event)">
                <img id="onizleme" class="hidden mt-4 rounded-xl max-h-64 mx-auto shadow">
            </div>

            <button onclick="analizYap()"
                id="analiz-btn"
                class="w-full bg-emerald-600 text-white py-4 rounded-xl font-semibold text-lg hover:bg-emerald-700 transition shadow-lg shadow-emerald-100">
                🔍 Analiz Et
            </button>
        </div>

        <div id="sonuc" class="hidden mt-6 bg-white rounded-2xl shadow-sm p-8 fade-in">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Analiz Sonucu</h2>
            <div id="sonuc-icerik"></div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const kullaniciAd = localStorage.getItem('kullanici_ad');
        if (!token) window.location.href = '/giris';
        if (kullaniciAd) document.getElementById('kullanici-ad').textContent = `👤 ${kullaniciAd}`;

        function cikisYap() {
            localStorage.removeItem('token');
            localStorage.removeItem('kullanici_ad');
            window.location.href = '/giris';
        }

        function tokenliIstek(url, ayarlar = {}) {
            return fetch(url, {
                ...ayarlar,
                headers: { ...(ayarlar.headers || {}), 'Authorization': `Bearer ${token}` }
            });
        }

        function raporTemizle(rapor) {
            if (!rapor) return '';
            const gizlenecekAlanlar = [
                'DEĞİŞİM', 'TAHMİN', 'RİSK_SKORU',
                'ÖNERİLEN_İLAÇ', 'ÖNERİLEN_DOZ', 'UYGULAMA_SIKLIĞI'
            ];
            const satirlar = rapor.split('\n');
            const sonuc = [];
            let atlaModu = false;
            for (const satir of satirlar) {
                const baslikMi = gizlenecekAlanlar.some(a => satir.trim().toUpperCase().startsWith(a + ':'));
                if (baslikMi) { atlaModu = true; continue; }
                if (atlaModu && /^[A-ZÇĞİÖŞÜ_]+:/.test(satir.trim())) { atlaModu = false; }
                if (!atlaModu) sonuc.push(satir);
            }
            return sonuc.join('\n').replace(/\n{3,}/g, '\n\n').trim();
        }

        async function bahceleriYukle() {
            try {
                const res = await tokenliIstek('/api/bahceler');
                if (res.status === 401) { window.location.href = '/giris'; return; }
                const bahceler = await res.json();
                const select = document.getElementById('bahce-sec');
                if (bahceler.length === 0) {
                    select.innerHTML = '<option value="">Önce bahçe ekleyin</option>';
                    return;
                }
                bahceler.forEach(b => { select.innerHTML += `<option value="${b.id}">${b.ad}</option>`; });
            } catch (e) { console.error(e); }
        }

        function fotografSec(event) {
            const dosya = event.target.files[0];
            if (!dosya) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('onizleme');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('yukle-alan').classList.add('hidden');
            };
            reader.readAsDataURL(dosya);
        }

        async function analizYap() {
            const bahceId = document.getElementById('bahce-sec').value;
            const fotograf = document.getElementById('fotograf-input').files[0];
            if (!bahceId) { alert('Lütfen bahçe seçin!'); return; }
            if (!fotograf) { alert('Lütfen fotoğraf seçin!'); return; }

            const btn = document.getElementById('analiz-btn');
            btn.disabled = true;
            btn.textContent = '⏳ Analiz ediliyor... (30-60 sn sürebilir)';

            const form = new FormData();
            form.append('fotograf', fotograf);
            form.append('bahce_id', bahceId);

            try {
                const res = await tokenliIstek('/api/analiz', { method: 'POST', body: form });
                const veri = await res.json();
                if (!res.ok) { alert('Hata: ' + (veri.detail || 'Analiz başarısız')); return; }

                const sonucDiv = document.getElementById('sonuc');
                const icerik = document.getElementById('sonuc-icerik');
                sonucDiv.classList.remove('hidden');
                sonucDiv.scrollIntoView({ behavior: 'smooth' });

                const saglikli = veri.hastalik_adi === 'Sağlıklı';
                const risk = veri.risk_skoru || 0;
                const riskRenk = risk <= 3 ? 'bg-emerald-500' : risk <= 6 ? 'bg-yellow-500' : 'bg-red-500';
                const riskYazi = risk <= 3 ? 'Düşük Risk' : risk <= 6 ? 'Orta Risk' : 'Yüksek Risk — Acil Müdahale!';
                const riskMetinRenk = risk <= 3 ? 'text-emerald-600' : risk <= 6 ? 'text-yellow-600' : 'text-red-600';
                const yoloEtiket = veri.tahmin ? veri.tahmin.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()) : '';

                icerik.innerHTML = `
                    <div class="flex items-center justify-between mb-6 p-4 rounded-2xl ${saglikli ? 'bg-emerald-50' : risk > 6 ? 'bg-red-50' : 'bg-yellow-50'}">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">${saglikli ? '✅' : risk > 6 ? '🚨' : '⚠️'}</span>
                            <div>
                                <p class="font-bold text-xl ${saglikli ? 'text-emerald-600' : 'text-red-600'}">${veri.hastalik_adi}</p>
                                ${yoloEtiket ? `<p class="text-xs text-gray-400 mt-0.5">Model tespiti: ${yoloEtiket}</p>` : ''}
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm text-gray-500 mb-1">Risk Skoru</div>
                            <div class="flex items-center gap-2">
                                <div class="w-24 bg-gray-200 rounded-full h-3">
                                    <div class="${riskRenk} h-3 rounded-full" style="width: ${risk * 10}%"></div>
                                </div>
                                <span class="font-bold text-lg">${risk}/10</span>
                            </div>
                            <div class="text-xs font-medium mt-1 ${riskMetinRenk}">${riskYazi}</div>
                        </div>
                    </div>

                    ${veri.degisim && veri.degisim !== 'İlk analiz' ? `
                    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4">
                        <p class="font-semibold text-blue-800 mb-1">📊 Önceki analize göre değişim:</p>
                        <p class="text-blue-700 text-sm">${veri.degisim}</p>
                    </div>` : `
                    <div class="bg-gray-50 border border-gray-200 rounded-xl p-3 mb-4">
                        <p class="text-gray-500 text-sm">📋 İlk analiz — karşılaştırma için geçmiş kayıt yok</p>
                    </div>`}

                    ${veri.tahmin ? `
                    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-4">
                        <p class="font-semibold text-yellow-800 mb-1">🔮 2 hafta sonra tahmin:</p>
                        <p class="text-yellow-700 text-sm">${veri.tahmin}</p>
                    </div>` : ''}

                    ${!saglikli && veri.onerilen_ilac ? `
                    <div class="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-4 grid grid-cols-3 gap-3">
                        <div>
                            <p class="text-xs text-purple-500 font-medium mb-1">💊 Önerilen İlaç</p>
                            <p class="text-purple-800 font-semibold text-sm">${veri.onerilen_ilac}</p>
                        </div>
                        <div>
                            <p class="text-xs text-purple-500 font-medium mb-1">⚖️ Doz</p>
                            <p class="text-purple-800 font-semibold text-sm">${veri.onerilen_doz || '—'}</p>
                        </div>
                        <div>
                            <p class="text-xs text-purple-500 font-medium mb-1">📅 Uygulama Sıklığı</p>
                            <p class="text-purple-800 font-semibold text-sm">${veri.uygulama_sikligi || '—'}</p>
                        </div>
                    </div>` : ''}

                    ${!saglikli ? `
                    <div class="bg-orange-50 border border-orange-200 rounded-2xl p-6 mt-4">
                        <h3 class="font-semibold text-orange-800 mb-4">💊 Tedavi Kaydı Oluştur</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">İlaç Adı</label>
                                <input type="text" id="tedavi-ilac" value="${veri.onerilen_ilac || veri.hastalik_adi + ' tedavisi'}"
                                    class="w-full border border-gray-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Doz</label>
                                <input type="text" id="tedavi-doz" value="${veri.onerilen_doz || ''}" placeholder="Örn: 2g/L"
                                    class="w-full border border-gray-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                                ${veri.uygulama_sikligi ? `<p class="text-sm text-orange-600 mt-1">⏰ Önerilen: <strong>${veri.uygulama_sikligi}</strong></p>` : ''}
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Uygulama Tarihi</label>
                                    <input type="date" id="tedavi-tarih" value="${new Date().toISOString().split('T')[0]}"
                                        class="w-full border border-gray-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Sonraki Uygulama</label>
                                    <input type="date" id="tedavi-sonraki"
                                        class="w-full border border-gray-300 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                                </div>
                            </div>
                            <button onclick="tedaviKaydet(${bahceId}, ${veri.analiz_id})"
                                class="w-full bg-orange-500 text-white py-3 rounded-xl font-semibold hover:bg-orange-600 transition">
                                💊 Tedaviyi Kaydet ve İlaçlamaya Ekle
                            </button>
                        </div>
                    </div>` : '<p class="text-emerald-600 font-medium text-center mt-4">✅ Bitkiniz sağlıklı görünüyor!</p>'}
                `;
            } catch (e) {
                alert('Bağlantı hatası: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Analiz Et';
            }
        }

        async function tedaviKaydet(bahceId, analizId) {
            const ilacAdi = document.getElementById('tedavi-ilac').value;
            const doz = document.getElementById('tedavi-doz').value;
            const tarih = document.getElementById('tedavi-tarih').value;
            const sonraki = document.getElementById('tedavi-sonraki').value;
            if (!tarih) { alert('Uygulama tarihi seçin!'); return; }
            const form = new FormData();
            form.append('bahce_id', bahceId);
            form.append('analiz_id', analizId);
            form.append('ilac_adi', ilacAdi);
            form.append('doz', doz);
            form.append('uygulama_tarihi', tarih);
            if (sonraki) form.append('sonraki_tarih', sonraki);
            form.append('notlar', 'AI analizi sonucu oluşturuldu');
            const res = await tokenliIstek('/api/ilaclamalar', { method: 'POST', body: form });
            if (res.ok) { alert('✅ Tedavi ilaçlama takibine eklendi!'); window.location.href = '/ilaclar'; }
            else { alert('Kayıt hatası oluştu!'); }
        }

        bahceleriYukle();
    </script>
</body>
</html>
